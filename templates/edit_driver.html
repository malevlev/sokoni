{% extends 'base.html' %}
{% block title %}Edit Driver{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Edit Driver</h1>
  <a href="{{ url_for('drivers') }}" class="btn">← Back</a>
</div>
<div class="card" style="max-width:500px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="full_name" value="{{ driver.full_name }}" required>
      </div>
      <div class="form-group">
        <label>License Number *</label>
        <input type="text" name="license_number" value="{{ driver.license_number }}" required>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ driver.phone or '' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          {% for val, lbl in [('available','Available'),('on_trip','On Trip'),('off_duty','Off Duty')] %}
          <option value="{{ val }}" {% if driver.status == val %}selected{% endif %}>{{ lbl }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
