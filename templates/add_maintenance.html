{% extends 'base.html' %}
{% block title %}Add Maintenance{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Add Maintenance Record</h1>
  <a href="{{ url_for('maintenance') }}" class="btn">← Back</a>
</div>
<div class="card" style="max-width:560px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Vehicle *</label>
          <select name="vehicle_id" required>
            <option value="">— Select —</option>
            {% for v in vehicles %}
            <option value="{{ v.id }}">{{ v.name }} ({{ v.registration }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Type *</label>
          <input type="text" name="type" placeholder="e.g. Oil Change" required>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date *</label>
          <input type="date" name="date" required>
        </div>
        <div class="form-group">
          <label>Cost (KES)</label>
          <input type="number" name="cost" step="0.01" min="0" value="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select name="status">
            <option value="scheduled">Scheduled</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="form-group">
          <label>Next Due Date</label>
          <input type="date" name="next_due">
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Add Record</button>
    </form>
  </div>
</div>
{% endblock %}
