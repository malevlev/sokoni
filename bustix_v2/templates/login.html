<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BusTix — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#E8A020;
  --accent-dark:#C4851A;
  --text:#F5F5F5;
  --muted:#A0A0A0;
  --border:rgba(255,255,255,0.12);
  --card:rgba(10,12,20,0.82);
}
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.bg{
  position:fixed;inset:0;
  background:url('/static/img/bus_bg.jpg') center/cover no-repeat;
  filter:brightness(0.45);
  z-index:0;
}
.overlay{
  position:fixed;inset:0;
  background:linear-gradient(135deg,rgba(5,8,18,0.75) 0%,rgba(10,15,30,0.5) 100%);
  z-index:1;
}
.card{
  position:relative;z-index:10;
  background:var(--card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:16px;
  padding:44px 40px;
  width:100%;max-width:400px;
}
.brand{margin-bottom:32px}
.brand-name{
  font-family:'Playfair Display',serif;
  font-size:26px;font-weight:700;
  color:#fff;letter-spacing:0.3px;
}
.brand-name span{color:var(--accent)}
.brand-sub{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:0.5px;text-transform:uppercase}
h1{font-size:20px;font-weight:600;color:#fff;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--muted);margin-bottom:28px}
.field{margin-bottom:18px}
label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px}
input{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  color:#fff;
  border-radius:8px;
  padding:12px 14px;
  font-size:14px;
  font-family:'Inter',sans-serif;
  outline:none;
  transition:border-color .2s,background .2s;
}
input:focus{border-color:var(--accent);background:rgba(255,255,255,0.09)}
input::placeholder{color:#555}
.btn{
  width:100%;
  background:var(--accent);
  color:#fff;
  border:none;border-radius:8px;
  padding:13px;
  font-size:14px;font-weight:600;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  transition:background .2s,transform .1s;
  margin-top:6px;
  letter-spacing:0.3px;
}
.btn:hover{background:var(--accent-dark)}
.btn:active{transform:scale(0.99)}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.alert{
  background:rgba(220,60,60,0.15);
  border:1px solid rgba(220,60,60,0.35);
  color:#f5a0a0;
  border-radius:8px;
  padding:11px 14px;
  font-size:13px;
  margin-bottom:18px;
  display:none;
}
.demo{margin-top:24px;padding-top:22px;border-top:1px solid var(--border)}
.demo-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;font-weight:600}
.demo-row{display:flex;gap:8px}
.demo-btn{
  flex:1;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:var(--muted);
  border-radius:7px;padding:9px 8px;
  font-size:12px;cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:border-color .2s,color .2s;
  font-weight:500;
}
.demo-btn:hover{border-color:var(--accent);color:var(--accent)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="card">
  <div class="brand">
    <div class="brand-name">Bus<span>Tix</span></div>
    <div class="brand-sub">Fleet Ticketing Platform</div>
  </div>
  <h1>Sign in</h1>
  <p class="subtitle">Enter your credentials to continue</p>
  <div class="alert" id="alert"></div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  <div class="demo">
    <div class="demo-label">Quick Access</div>
    <div class="demo-row">
      <button class="demo-btn" onclick="fillCreds('manager','manager123')">Manager</button>
      <button class="demo-btn" onclick="fillCreds('conductor1','pass123')">Conductor</button>
    </div>
  </div>
</div>
<script>
function fillCreds(u,p){document.getElementById('username').value=u;document.getElementById('password').value=p}
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
async function doLogin(){
  const btn=document.getElementById('loginBtn');
  const alertEl=document.getElementById('alert');
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  if(!u||!p){showAlert('Please fill in all fields');return}
  btn.innerHTML='<span class="spinner"></span>Signing in...';btn.disabled=true;alertEl.style.display='none';
  try{
    const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d=await r.json();
    if(d.ok){window.location.href=d.role==='manager'?'/manager':'/conductor'}
    else{showAlert(d.msg||'Invalid credentials')}
  }catch(e){showAlert('Connection error. Please try again.')}
  btn.innerHTML='Sign In';btn.disabled=false;
}
function showAlert(msg){const a=document.getElementById('alert');a.textContent=msg;a.style.display='block'}
</script>
</body>
</html>
