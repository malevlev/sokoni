<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}BusTix{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080C18;
  --surface:#0D1526;
  --card:#111D33;
  --card2:#162040;
  --accent:#E8A020;
  --accent-dim:rgba(232,160,32,0.10);
  --blue:#3B82F6;
  --blue-dim:rgba(59,130,246,0.10);
  --green:#22C55E;
  --green-dim:rgba(34,197,94,0.10);
  --red:#EF4444;
  --red-dim:rgba(239,68,68,0.10);
  --text:#F1F5F9;
  --text2:#94A3B8;
  --text3:#475569;
  --border:#1E2D45;
  --border2:#243554;
  --sidebar-w:230px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px}

/* LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:22px 18px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-mark{width:32px;height:32px;background:var(--accent);border-radius:7px;flex-shrink:0}
.logo-name{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#fff}
.logo-name span{color:var(--accent)}
.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);padding:12px 10px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;cursor:pointer;transition:background .15s,color .15s;color:var(--text2);text-decoration:none;margin-bottom:1px;font-size:13px;font-weight:500}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
.nav-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;margin-left:2px}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:9px;padding:10px 11px;background:var(--card);border-radius:8px}
.avatar{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;font-family:'Inter',sans-serif}
.user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--text2);font-weight:400}
.logout-btn{display:flex;align-items:center;gap:6px;padding:8px 11px;color:var(--text3);cursor:pointer;font-size:12px;text-decoration:none;margin-top:5px;border-radius:7px;transition:color .15s,background .15s;font-weight:500}
.logout-btn:hover{color:var(--red);background:var(--red-dim)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;background:var(--surface);flex-shrink:0}
.topbar h1{font-size:15px;font-weight:600;flex:1;letter-spacing:0.1px}
.live-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--green-dim);color:var(--green);letter-spacing:0.3px}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.content{flex:1;overflow-y:auto;padding:22px 24px}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.stat-top-bar{position:absolute;top:0;left:0;right:0;height:2px}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text2);margin-bottom:10px}
.stat-value{font-size:26px;font-weight:700;line-height:1;font-family:'Inter',sans-serif}
.stat-sub{font-size:12px;color:var(--text2);margin-top:5px}

/* PANELS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.panel-title{font-size:14px;font-weight:600;letter-spacing:0.1px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);border-bottom:1px solid var(--border);font-weight:600}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,0.015)}

/* STATUS */
.status{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.3px}
.status.active{background:var(--green-dim);color:var(--green)}
.status.scheduled{background:var(--blue-dim);color:var(--blue)}
.status.completed{background:rgba(100,116,139,0.12);color:#94A3B8}
.status.cancelled{background:var(--red-dim);color:var(--red)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;border:none;transition:all .15s;letter-spacing:0.1px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#C4851A}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.btn-green:hover{background:var(--green);color:#fff;border-color:var(--green)}
.btn-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.btn-red:hover{background:var(--red);color:#fff}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.modal h2{font-size:17px;font-weight:600;margin-bottom:18px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text2);margin-bottom:6px}
.field input,.field select{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:10px 13px;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:#111D33}
.modal-footer{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}

/* PROGRESS */
.progress-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;z-index:9999;transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none;max-width:300px}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{border-color:rgba(34,197,94,0.4);color:var(--green)}
#toast.error{border-color:rgba(239,68,68,0.4);color:var(--red)}

/* MISC */
.empty{text-align:center;padding:36px 20px;color:var(--text3)}
.empty p{font-size:13px}
.tabs{display:flex;gap:3px;background:var(--surface);border-radius:9px;padding:3px;margin-bottom:18px;border:1px solid var(--border)}
.tab{flex:1;padding:7px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s}
.tab.active{background:var(--card);color:var(--text);font-weight:600}
.ticket-card{background:linear-gradient(135deg,#162040,#0D1526);border:1px solid var(--border2);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.ticket-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue))}
.ticket-number{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:1.5px;font-family:'Inter',sans-serif}
.ticket-divider{border:none;border-top:1px dashed var(--border2);margin:14px 0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.mb-4{margin-bottom:16px}.text-muted{color:var(--text2)}.text-sm{font-size:12px}.font-bold{font-weight:700}.text-green{color:var(--green)}.text-red{color:var(--red)}.text-yellow{color:var(--accent)}.text-blue{color:var(--blue)}.w-full{width:100%}
</style>
{% block head %}{% endblock %}
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"></div>
      <div class="logo-name">Bus<span>Tix</span></div>
    </div>
    <nav class="sidebar-nav">
      {% block nav %}{% endblock %}
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar">{{ name[0]|upper if name else 'U' }}</div>
        <div>
          <div class="user-name">{{ name }}</div>
          <div class="user-role">{% block role_label %}User{% endblock %}</div>
        </div>
      </div>
      <a class="logout-btn" href="/logout">Sign out</a>
    </div>
  </aside>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
<div id="toast"></div>
<script>
function toast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='show '+type;
  setTimeout(()=>t.className='',3000);
}
async function api(url,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts);
  const d=await r.json();
  if(!r.ok)throw new Error(d.msg||'Request failed');
  return d;
}
function fmtMoney(n){return'KSh '+Number(n).toLocaleString()}
function fmtNum(n){return Number(n).toLocaleString()}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
