{% extends 'base.html' %}
{% block title %}Add Vehicle{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Add Vehicle</h1>
  <a href="{{ url_for('vehicles') }}" class="btn">← Back</a>
</div>
<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Vehicle Name *</label>
          <input type="text" name="name" required>
        </div>
        <div class="form-group">
          <label>Registration *</label>
          <input type="text" name="registration" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Make</label>
          <input type="text" name="make">
        </div>
        <div class="form-group">
          <label>Model</label>
          <input type="text" name="model">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Year</label>
          <input type="number" name="year" min="1990" max="2030">
        </div>
        <div class="form-group">
          <label>Fuel Level (%)</label>
          <input type="number" name="fuel_level" min="0" max="100" value="100">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select name="status">
            <option value="active">Active</option>
            <option value="maintenance">Maintenance</option>
            <option value="stalled">Stalled</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <div class="form-group">
          <label>Assign Driver</label>
          <select name="driver_id">
            <option value="">— None —</option>
            {% for d in drivers %}
            <option value="{{ d.id }}">{{ d.full_name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Add Vehicle</button>
    </form>
  </div>
</div>
{% endblock %}
