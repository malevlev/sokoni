services:
  - type: web
    name: bustix
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bustix-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: bustix-db
    plan: free
